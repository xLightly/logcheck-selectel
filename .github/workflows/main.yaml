  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build custom analyzer
        run: go build -o /tmp/logcheck ./cmd/logcheck/

      - name: Run custom linter with go vet
        run: go vet -vettool=/tmp/logcheck ./...

      - name: Run golangci-lint for other linters
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --disable-all -E gofmt,goimports,revive